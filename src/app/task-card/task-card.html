<mat-card class="tasks-card">
  <mat-card-header>
    <mat-card-title>Tasks</mat-card-title>
    <button mat-icon-button class="more-btn"><mat-icon>more_horiz</mat-icon></button>
  </mat-card-header>

  <mat-card-content>
    <mat-checkbox *ngFor="let task of tasks" class="task-item" [(ngModel)]="task.completed">
      <div class="task-content">
        <span class="task-title">{{ task.title }}</span>
        <span class="task-due" [ngClass]="{ 'overdue': task.due.includes('2019') }">{{ task.due }}</span>
      </div>
    </mat-checkbox>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button color="primary">SEE ALL →</button>
  </mat-card-actions>
</mat-card>
