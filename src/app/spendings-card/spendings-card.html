<mat-card class="spendings-card">
  <mat-card-header>
    <mat-card-title>
      <mat-icon>payments</mat-icon> Spendings
      <button mat-icon-button class="more-btn"><mat-icon>more_horiz</mat-icon></button>
    </mat-card-title>
    <mat-card-subtitle>Payments</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="chart-container">
      <canvas baseChart
        [data]="doughnutChartData"
        [options]="doughnutChartOptions"
        [type]="doughnutChartType">
      </canvas>
    </div>

    <div class="legend-override" *ngIf="false"> 
      <!-- optional custom legend if needed -->
      <!-- You can build custom legend here if default doesn't fit perfectly -->
    </div>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button color="primary">SEE DETAILS →</button>
  </mat-card-actions>
</mat-card>
